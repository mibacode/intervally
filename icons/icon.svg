<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#1b2336" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7a45" />
      <stop offset="50%" stop-color="#ff3b30" />
      <stop offset="100%" stop-color="#00f0ff" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#glowGrad)" stroke-width="16" stroke-linecap="round" stroke-dasharray="1130" stroke-dashoffset="300" filter="url(#glow)" />
  <!-- Central minimalist stopwatch hand + play triangle -->
  <polygon points="230,190 230,322 310,256" fill="#ffffff" />
  <circle cx="256" cy="110" r="15" fill="#ff7a45" />
</svg>
